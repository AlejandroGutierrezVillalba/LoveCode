<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfiles | LoveCode</title>
    <link rel="stylesheet" href="perfiles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="lovecode_logo.jpeg" alt="LoveCode Logo" class="logo-image">
        </div>
        <div class="nav-links">
            <a href="index.html" class="btn-outline">Salir</a>
        </div>
    </nav>

    <main class="discover-container">
        <div class="card-stack">

            <div class="profile-card">
                <div class="card-header">
                    <div class="avatar">AL</div>
                    <div class="card-info">
                        <h2 class="card-name">Ada Lovelace</h2>
                        <p class="card-ciudad">📍 Barcelona</p>
                    </div>
                </div>

                <p class="card-descripcion">
                    Apasionada del frontend y el diseño UX. Busco a alguien con quien hacer pair programming.
                </p>

                <div class="tech-tags">
                    <span class="tag frontend">HTML</span>
                    <span class="tag frontend">CSS</span>
                    <span class="tag frontend">JavaScript</span>
                    <span class="tag frontend">React</span>
                    <span class="tag devops">Git</span>
                </div>

                <div class="card-actions">
                    <button class="btn-dislike" title="Pasar">✕</button>
                    <button class="btn-like" title="Like">♥</button>
                </div>
            </div>

        </div>

        <p class="no-more" style="display:none;">
            No hay más perfiles por ahora. <a href="index.html">Volver al inicio</a>
        </p>
    </main>
</body>
</html>
