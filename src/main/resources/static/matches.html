<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Mis Matches</title>
    <link rel="stylesheet" href="matches.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-wrap">
            <a href="index.html" class="logo-text">Love<span class="logo-accent">Code</span></a>
        </div>
        <div class="nav-actions">
            <a href="perfiles.html" class="btn btn-secondary">Descubrir</a>
            <button id="logout-btn" class="btn btn-outline">Cerrar sesión</button>
        </div>
    </nav>

    <main class="matches-container">
        <div class="matches-header">
            <h1 class="matches-title">Tus <em>matches</em></h1>
            <p class="matches-subtitle">Usuarios con los que tienes tecnologías en común</p>
        </div>
        <div id="matches-list" class="matches-list">
            <!-- Los matches se cargan dinámicamente con JavaScript -->
        </div>
        <p id="no-matches" class="no-matches" style="display:none;">
            Aún no tienes matches.<br>
            <a href="perfiles.html">Empieza a explorar perfiles</a>
        </p>
    </main>

    <div class="decoration decoration-1">{ }</div>
    <div class="decoration decoration-2">&lt;/&gt;</div>

    <script src="matches.js"></script>
</body>
</html>
