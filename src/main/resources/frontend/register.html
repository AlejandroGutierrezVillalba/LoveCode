<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Crear cuenta</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-wrap">
            <a href="index.html" class="logo-text">Love<span class="logo-accent">Code</span></a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card" style="max-width: 480px;"> <div class="card-header">
                <h1 class="card-title">Crea tu perfil</h1>
                <p class="card-subtitle">Empieza a buscar tu <em>for definitivo</em></p>
            </div>

            <form action="RegistroServlet" method="POST">
                <div class="input-group">
                    <label>Nombre de usuario</label>
                    <input type="text" name="username" placeholder="p.ej. java_lover" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="dev@lovecode.com" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label>Género</label>
                        <select name="genero" class="custom-select">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                            <option value="O">Otro</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse ahora</button>
            </form>

            <div class="card-footer">
                <span class="separator">──────</span>
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>
    </main>
</body>
</html>
