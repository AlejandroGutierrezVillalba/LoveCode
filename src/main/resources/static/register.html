<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Crear cuenta</title>
    <link rel="stylesheet" href="register.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-wrap">
            <a href="index.html" class="logo-text">Love<span class="logo-accent">Code</span></a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="card-header">
                <h1 class="card-title">Crea tu perfil</h1>
                <p class="card-subtitle">Empieza a buscar tu <em>for definitivo</em></p>
            </div>

            <div id="error-msg" class="error-msg" style="display:none;">
                Error al registrar. Comprueba los datos.
            </div>

            <form id="register-form">
                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ada Lovelace" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="dev@lovecode.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" 
                        placeholder="••••••••" 
                        pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                        title="Mínimo 8 caracteres, una mayúscula y un número"
                        required>
                <small class="input-hint">Mínimo 8 caracteres, una mayúscula y un número</small>
                </div>
                <div class="input-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" placeholder="Madrid" required>
                </div>
                <div class="input-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Cuéntanos sobre ti y tus tecnologías favoritas..." rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse ahora</button>
            </form>

            <div class="card-footer">
                <span class="separator">──────</span>
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>
    </main>

    <div class="decoration decoration-1">{ }</div>
    <div class="decoration decoration-2">&lt;/&gt;</div>

    <script src="register.js"></script>
</body>
</html>
