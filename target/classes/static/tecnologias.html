<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Tus tecnologías</title>
    <link rel="stylesheet" href="tecnologias.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-wrap">
            <a href="index.html" class="logo-text">Love<span class="logo-accent">Code</span></a>
        </div>
    </nav>

    <main class="tech-container">
        <div class="tech-card">
            <div class="card-header">
                <h1 class="card-title">¿Qué tecnologías conoces?</h1>
                <p class="card-subtitle">Selecciona al menos una para encontrar tu <em>match</em></p>
            </div>

            <div id="tech-list" class="tech-list">
                <!-- Se carga dinámicamente -->
            </div>

            <div id="error-msg" class="error-msg" style="display:none;">
                Selecciona al menos una tecnología.
            </div>

            <button id="guardar-btn" class="btn btn-primary">Continuar</button>
        </div>
    </main>

    <div class="decoration decoration-1">{ }</div>
    <div class="decoration decoration-2">&lt;/&gt;</div>

    <script src="tecnologias.js"></script>
</body>
</html>
