<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveCode | Iniciar sesión</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-wrap">
            <a href="index.html" class="logo-text">Love<span class="logo-accent">Code</span></a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">

            <div class="card-header">
                <h1 class="card-title">Bienvenido de nuevo</h1>
                <p class="card-subtitle">Inicia sesión en tu cuenta</p>
            </div>

            <div id="error-msg" class="error-msg" style="display:none;">
                Email o contraseña incorrectos.
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="developer@lovecode.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary">Iniciar sesión</button>
            </form>

            <div class="card-footer">
                <span class="separator">──────</span>
                <p>¿Todavía no tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>

        </div>
    </main>

    <div class="decoration decoration-1">{ }</div>
    <div class="decoration decoration-2">&lt;/&gt;</div>

    <script src="login.js"></script>
    <script src="register.js"></script>
    <script src="perfiles.js"></script>
    <script src="matches.js"></script>
    
</body>
</html>
